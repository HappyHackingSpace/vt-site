<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerable Targets (VT) // Next-gen vuln testing platform </title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Vulnerable Targets (VT) is an open-source catalog of vulnerable applications, CVE PoCs, and security benchmarks for penetration testing and research.">
    <meta name="keywords"
        content="vulnerable apps, cve poc, security research, penetration testing, ctf, labs, security benchmarks, docker, cybersecurity">
    <meta name="author" content="HappyHackingSpace">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vulnerabletarget.com/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vulnerabletarget.com/">
    <meta property="og:title" content="Vulnerable Targets (VT) // Security Research Templates">
    <meta property="og:description"
        content="Explore hundreds of vulnerable applications and CVE Proof-of-Concepts directly in your browser or CLI.">
    <meta property="og:image" content="https://vulnerabletarget.com/assets/images/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vulnerabletarget.com/">
    <meta property="twitter:title" content="Vulnerable Targets (VT) // Security Research Templates">
    <meta property="twitter:description"
        content="Explore hundreds of vulnerable applications and CVE Proof-of-Concepts directly in your browser or CLI.">
    <meta property="twitter:image" content="https://vulnerabletarget.com/assets/images/og-image.png">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
</head>

<body>
    <canvas id="matrix-bg"></canvas>

    <header>

        <h1><a href="/" id="glitch-title">VULNERABLE TARGETS</a></h1>
        <p>// Security Research Templates Catalog //</p>

    </header>

    <main>
        <div class="terminal-header">search --query</div>
        <div class="search-container">
            <input type="text" id="search" placeholder="CVE-2024-XXXX, XSS, RCE, Django, Laravel..." autocomplete="off"
                spellcheck="false">
        </div>

        <div class="stats">
            <span class="stat" onclick="filterByCategory('')" style="cursor:pointer">TARGETS: <span class="stat-value"
                    id="total-count">0</span></span>
            <span class="stat" onclick="filterByCategory('cves')" style="cursor:pointer">CVEs: <span class="stat-value"
                    id="cve-count">0</span></span>
            <span class="stat" onclick="filterByCategory('benchmarks')" style="cursor:pointer">BENCHMARKS: <span
                    class="stat-value" id="benchmark-count">0</span></span>
            <span class="stat" onclick="filterByCategory('labs')" style="cursor:pointer">LABS: <span class="stat-value"
                    id="lab-count">0</span></span>
        </div>

        <div class="templates-grid" id="templates-grid">
            <div class="loading"></div>
        </div>

        <div class="no-results" id="no-results" style="display: none;">
            No targets found matching query.
        </div>
    </main>

    <footer>
        <a href="https://github.com/HappyHackingSpace" target="_blank">HappyHackingSpace</a> // 2026
    </footer>

    <script>
        // Glitch title effect
        (function () {
            const title = document.getElementById('glitch-title');
            const text = title.textContent;
            title.innerHTML = text.split('').map(char =>
                char === ' ' ? ' ' : `<span class="glitch-char">${char}</span>`
            ).join('');

            function glitchWave() {
                const chars = title.querySelectorAll('.glitch-char');
                let i = 0;
                const interval = setInterval(() => {
                    if (i > 0) chars[i - 1].classList.remove('glitch-active');
                    if (i < chars.length) {
                        chars[i].classList.add('glitch-active');
                        i++;
                    } else {
                        chars[chars.length - 1].classList.remove('glitch-active');
                        clearInterval(interval);
                    }
                }, 40);
            }

            glitchWave();
            setInterval(glitchWave, 3000);
        })();

        // Matrix rain effect
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>{}[]=/\\';
        const charArray = chars.split('');
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#404040';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        });

        // Format ID: VT- prefix uppercase, rest as-is
        function formatId(id) {
            if (id && id.toLowerCase().startsWith('vt-')) {
                return 'VT-' + id.substring(3);
            }
            return id;
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function safeClass(s) {
            return String(s).replace(/[^a-zA-Z0-9_-]/g, '');
        }

        // Fetch with retry mechanism
        async function fetchWithRetry(url, options = {}, maxRetries = 3) {
            let lastError;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response;
                } catch (err) {
                    lastError = err;
                    console.warn(`Fetch attempt ${i + 1} failed:`, err.message);
                    if (i < maxRetries - 1) {
                        const delay = Math.pow(2, i) * 1000; // 1s, 2s, 4s
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }
            throw lastError;
        }

        function showFetchError(message) {
            document.getElementById('templates-grid').innerHTML = `
                <div class="no-results" style="display:block; text-align:center;">
                    <p style="color:var(--danger); margin-bottom:1rem;">⚠ ${escapeHtml(message)}</p>
                    <button onclick="location.reload()" class="btn" style="padding:0.5rem 1.5rem;">↻ TRY AGAIN</button>
                </div>
            `;
        }

        // Load templates
        fetchWithRetry('./assets/templates.json')
            .then(res => res.json())
            .then(templates => {
                window.templates = templates;
                window.templatesMap = {};
                templates.forEach(t => window.templatesMap[t.id] = t);
                renderStats(templates);
                renderTemplates(templates);
                setupSearch();
            })
            .catch(err => {
                console.error('Failed to load templates after retries:', err);
                showFetchError('CONNECTION FAILED: Unable to load targets database.');
            });

        function renderStats(templates) {
            document.getElementById('total-count').textContent = templates.length;
            document.getElementById('cve-count').textContent = templates.filter(t => t.category === 'cves').length;
            document.getElementById('benchmark-count').textContent = templates.filter(t => t.category === 'benchmarks').length;
            document.getElementById('lab-count').textContent = templates.filter(t => t.category === 'labs').length;
        }

        function renderTemplates(templates) {
            const grid = document.getElementById('templates-grid');
            const noResults = document.getElementById('no-results');

            if (templates.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            grid.innerHTML = templates.map(t => {
                return `
    <a href="/${escapeHtml(formatId(t.id))}" class="template-card">
      <div class="template-header">
        <span class="template-id">${escapeHtml(formatId(t.id))}</span>
        <div class="header-badges">
          ${t.info?.difficulty ? `<span class="difficulty difficulty-${safeClass(t.info.difficulty.toLowerCase())}">${escapeHtml(t.info.difficulty)}</span>` : ''}
          <span class="category ${safeClass(t.category)}">${escapeHtml(t.category)}</span>
        </div>
      </div>
      <h3 class="template-name">${escapeHtml(t.info?.name || t.id)}</h3>
      <p class="template-description">${escapeHtml((t.info?.description || '').replace(/\n/g, ' ').substring(0, 120))}${(t.info?.description?.length > 120) ? '...' : ''}</p>
      <div class="tags">
        ${(t.info?.tags || []).slice(0, 4).map(tag =>
                    `<span class="tag ${['cve', 'xss', 'sqli', 'rce', 'ssrf', 'lfi', 'rfi'].includes(tag.toLowerCase()) ? safeClass(tag.toLowerCase()) : ''}" data-search-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`
                ).join('')}
        ${t.info?.cve ? `<span class="tag cve" data-search-tag="${escapeHtml(t.info.cve)}">${escapeHtml(t.info.cve)}</span>` : ''}
      </div>
    </a>
  `}).join('');
        }

        function setupSearch() {
            const searchInput = document.getElementById('search');
            let debounceTimer;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const query = e.target.value.toLowerCase().trim();

                    if (!query) {
                        renderTemplates(window.templates);
                        return;
                    }

                    const filtered = window.templates.filter(t => {
                        const searchable = [
                            t.id,
                            t.info?.name,
                            t.info?.description,
                            t.info?.cve,
                            t.info?.cwe,
                            t.category,
                            ...(t.info?.tags || []),
                            ...(t.info?.targets || [])
                        ].filter(Boolean).join(' ').toLowerCase();

                        return searchable.includes(query);
                    });

                    renderTemplates(filtered);
                }, 150);
            });

            // Focus search on / key
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== searchInput) {
                    e.preventDefault();
                    searchInput.focus();
                }
            });
        }

        // Tag click handler (event delegation - safe from inline JS injection)
        document.getElementById('templates-grid').addEventListener('click', (e) => {
            const tagEl = e.target.closest('[data-search-tag]');
            if (tagEl) {
                e.preventDefault();
                e.stopPropagation();
                const searchInput = document.getElementById('search');
                searchInput.value = tagEl.dataset.searchTag;
                searchInput.dispatchEvent(new Event('input'));
            }
        });

        function filterByCategory(category) {
            const searchInput = document.getElementById('search');
            if (!category) {
                searchInput.value = '';
                renderTemplates(window.templates);
            } else {
                searchInput.value = category;
                const filtered = window.templates.filter(t => t.category === category);
                renderTemplates(filtered);
            }
        }
    </script>
</body>

</html>
