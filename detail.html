<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details - Vulnerable Targets (VT) // Next-gen vuln testing platform</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Detailed technical analysis, Proof-of-Concept (PoC), and installation guide for a specific vulnerable target.">
    <meta name="keywords" content="cve detail, vulnerability analysis, poc exploit, security template, docker install">
    <meta name="author" content="HappyHackingSpace">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="Vulnerable Target Details // VT">
    <meta property="og:description" content="View technical details, impact, and remediation for this vulnerability.">
    <meta property="og:image" content="https://vulnerabletarget.com/assets/images/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Vulnerable Target Details // VT">
    <meta property="twitter:description"
        content="View technical details, impact, and remediation for this vulnerability.">
    <meta property="twitter:image" content="https://vulnerabletarget.com/assets/images/og-image.png">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <style>
        .detail-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .back-link:hover {
            color: var(--text-bright);
        }

        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .detail-id {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .detail-id::before {
            content: '0x';
            color: var(--accent);
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-bright);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .detail-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-item .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .meta-item .value {
            font-size: 0.9rem;
            color: var(--text);
        }

        .meta-item .value.danger {
            color: var(--danger);
        }

        .detail-section {
            margin: 1.5rem 0;
        }

        .section-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .section-text {
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text);
            white-space: normal;
        }

        .technical-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-family: monospace;
            font-size: 0.85rem;
        }

        /* HTTP Viewer */
        .http-viewer {
            margin: 1.5rem 0;
        }

        .http-step-label {
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary);
            margin: 1.5rem 0 0.5rem 0;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        .http-step-label:first-of-type {
            margin-top: 0.5rem;
        }

        .http-exchange {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .http-block {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .http-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.015);
        }

        .http-block-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .http-block-label span {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .http-method {
            font-size: 0.6rem;
            font-weight: bold;
            padding: 0.1rem 0.4rem;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .http-method.get {
            color: #22c55e;
            border-color: #22c55e;
        }

        .http-method.post {
            color: var(--info);
            border-color: var(--info);
        }

        .http-method.put {
            color: var(--warning);
            border-color: var(--warning);
        }

        .http-method.delete {
            color: var(--danger);
            border-color: var(--danger);
        }

        .http-status {
            font-size: 0.6rem;
            font-weight: bold;
            padding: 0.1rem 0.4rem;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .http-status.s2xx {
            color: #22c55e;
            border-color: #22c55e;
        }

        .http-status.s3xx {
            color: var(--warning);
            border-color: var(--warning);
        }

        .http-status.s4xx {
            color: var(--warning);
            border-color: var(--warning);
        }

        .http-status.s5xx {
            color: var(--danger);
            border-color: var(--danger);
        }

        .http-copy {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 0.6rem;
            padding: 0.15rem 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .http-copy:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .http-copy.copied {
            border-color: #22c55e;
            color: #22c55e;
        }

        .http-content {
            padding: 0.75rem;
            overflow-x: auto;
        }

        .http-content pre {
            font-family: inherit;
            font-size: 0.78rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }

        .hl-method {
            color: #22c55e;
            font-weight: bold;
        }

        .hl-url {
            color: var(--text-bright);
        }

        .hl-ver {
            color: var(--text-dim);
        }

        .hl-sok {
            color: #22c55e;
        }

        .hl-serr {
            color: var(--danger);
        }

        .hl-hk {
            color: var(--accent);
        }

        .hl-hv {
            color: var(--text);
        }

        .hl-body {
            color: var(--text-bright);
        }

        .hl-danger {
            color: #ef4444;
            font-weight: bold;
            background: rgba(239, 68, 68, 0.1);
            padding: 0 0.15rem;
            border-radius: 2px;
        }

        .hl-sep {
            color: var(--border);
        }

        .http-arrow {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
        }

        .http-endpoint-info {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
            padding: 0.5rem 0.75rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
        }

        .http-endpoint-info .ep-item {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .http-endpoint-info .ep-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .http-endpoint-info .ep-value {
            font-size: 0.75rem;
            color: var(--text-bright);
        }

        .http-endpoint-info .ep-value.vuln {
            color: var(--danger);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            text-transform: lowercase;
        }

        .tag.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .poc-files {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .poc-file {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .poc-file.nuclei {
            border-color: var(--info);
            color: var(--info);
        }

        .poc-file.semgrep {
            border-color: var(--warning);
            color: var(--warning);
        }

        .poc-file.bambda {
            border-color: #a855f7;
            color: #a855f7;
        }

        a.poc-file {
            text-decoration: none;
            transition: all 0.2s ease;
        }

        a.poc-file:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .code-block {
            display: block;
            font-size: 0.8rem;
            padding: 1rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            overflow-x: auto;
        }

        .ref-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .ref-list li {
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .ref-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .ref-list a {
            color: var(--text-dim);
            word-break: break-all;
        }

        .ref-list a:hover {
            color: var(--text-bright);
        }

        .detail-actions {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-family: inherit;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            background: transparent;
        }

        .btn-primary {
            border-color: var(--text-bright);
            color: var(--text-bright);
        }

        .btn-primary:hover {
            background: var(--text-bright);
            color: var(--bg);
        }

        .btn-secondary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .not-found {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .not-found h2 {
            color: var(--danger);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .loading-detail {
            text-align: center;
            padding: 4rem;
            color: var(--accent);
        }

        /* Difficulty colors */
        .difficulty-easy {
            color: #22c55e;
        }

        .difficulty-medium {
            color: var(--warning);
        }

        .difficulty-hard {
            color: var(--danger);
        }

        /* Post-install section */
        .post-install-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 1.25rem;
            margin-top: 1.5rem;
        }

        .post-install-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-install-list li {
            font-size: 0.85rem;
            padding: 0.5rem 0 0.5rem 1.5rem;
            position: relative;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }

        .post-install-list li:last-child {
            border-bottom: none;
        }

        .post-install-list li::before {
            content: '$';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <canvas id="matrix-bg"></canvas>

    <header>
        <h1><a href="/">VULNERABLE TARGETS</a></h1>
        <p>// Security Research Templates Catalog //</p>
    </header>

    <div class="detail-container">
        <a href="/" class="back-link">← Back to catalog</a>
        <div id="detail-content">
            <div class="loading-detail">[ LOADING... ]</div>
        </div>
    </div>

    <footer>
        <a href="https://github.com/HappyHackingSpace" target="_blank">HappyHackingSpace</a> // 2026
    </footer>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = 'アイウエオカキクケコ0123456789ABCDEF<>{}[]';
        const charArray = chars.split('');
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];
        for (let i = 0; i < columns; i++) drops[i] = Math.random() * -100;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#404040';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // Get ID from URL: support both ?id=xxx and /VT-xxx path formats
        const urlParams = new URLSearchParams(window.location.search);
        const paramId = urlParams.get('id');
        const pathParts = window.location.pathname.split('/').filter(p => p);
        const pathId = pathParts.length > 0 ? pathParts[pathParts.length - 1] : null;
        const rawId = paramId || (pathId && pathId !== 'detail.html' ? pathId : null);
        const templateId = rawId ? rawId.toLowerCase() : null;

        if (!templateId || !isValidId(templateId)) {
            document.getElementById('detail-content').innerHTML = `
                <div class="not-found">
                    <h2>ERROR 400</h2>
                    <p>${!templateId ? 'No template ID specified.' : 'Invalid template ID format.'}</p>
                    <p style="margin-top: 1rem;"><a href="/">← Return to catalog</a></p>
                </div>
            `;
        } else {
            fetch('./assets/templates.json')
                .then(res => res.json())
                .then(templates => {
                    const template = templates.find(t => t.id === templateId);
                    if (!template) {
                        document.getElementById('detail-content').innerHTML = `
                            <div class="not-found">
                                <h2>ERROR 404</h2>
                                <p>Template "${escapeHtml(templateId)}" not found.</p>
                                <p style="margin-top: 1rem;"><a href="/">← Return to catalog</a></p>
                            </div>
                        `;
                        return;
                    }

                    const pageTitle = `${template.info?.name || template.id} // VT`;
                    const pageDesc = (template.info?.description || "Technical analysis and PoC for " + template.id).substring(0, 150) + "...";

                    document.title = pageTitle;

                    // Update Dynamic Meta Tags
                    const setMeta = (selector, content) => {
                        const el = document.querySelector(selector);
                        if (el) el.setAttribute('content', content);
                    };

                    setMeta('meta[name="description"]', pageDesc);
                    setMeta('meta[property="og:title"]', pageTitle);
                    setMeta('meta[property="og:description"]', pageDesc);
                    setMeta('meta[name="twitter:title"]', pageTitle);
                    setMeta('meta[name="twitter:description"]', pageDesc);

                    renderDetail(template);
                })
                .catch(err => {
                    document.getElementById('detail-content').innerHTML = `
                        <div class="not-found">
                            <h2>ERROR 500</h2>
                            <p>Failed to load template data.</p>
                        </div>
                    `;
                });
        }

        function renderDetail(t) {
            const info = t.info || {};
            const poc = t.poc || {};
            const providers = t.providers || {};

            // Format ID: VT- prefix uppercase, rest as-is
            function formatId(id) {
                if (id && id.toLowerCase().startsWith('vt-')) {
                    return 'VT-' + id.substring(3);
                }
                return id;
            }

            document.getElementById('detail-content').innerHTML = `
                <div class="detail-card">
                    <div class="detail-header">
                        <span class="detail-id">${escapeHtml(formatId(t.id))}</span>
                        <span class="category ${safeClass(t.category)}">${escapeHtml(t.category)}</span>
                    </div>

                    <h1 class="detail-title">${escapeHtml(info.name || t.id)}</h1>

                    <div class="detail-meta">
                        ${info.cve ? `<div class="meta-item"><span class="label">CVE</span><span class="value danger">${escapeHtml(info.cve)}</span></div>` : ''}
                        ${info.cwe ? `<div class="meta-item"><span class="label">CWE</span><span class="value">${escapeHtml(info.cwe)}</span></div>` : ''}
                        ${info.cvss?.score ? `<div class="meta-item"><span class="label">CVSS Score</span><span class="value ${parseFloat(info.cvss.score) >= 7 ? 'danger' : ''}">${escapeHtml(info.cvss.score)}</span></div>` : ''}
                        ${info.author ? `<div class="meta-item"><span class="label">Author</span><span class="value">${escapeHtml(info.author)}</span></div>` : ''}
                        ${info.type ? `<div class="meta-item"><span class="label">Type</span><span class="value">${escapeHtml(info.type)}</span></div>` : ''}
                        ${info.difficulty ? `<div class="meta-item"><span class="label">Difficulty</span><span class="value difficulty-${safeClass(info.difficulty.toLowerCase())}">${escapeHtml(info.difficulty)}</span></div>` : ''}
                    </div>

                    <div class="detail-section">
                        <span class="section-label">// Description</span>
                        <p class="section-text">${escapeHtml(info.description || 'No description available.')}</p>
                    </div>

                    ${t.technical ? `
                    <div class="detail-section">
                        <span class="section-label">// Technical Details</span>
                        <p class="section-text technical-text">${escapeHtml(t.technical)}</p>
                    </div>
                    ` : ''}

                    ${(() => {
                    // Normalize vulnerabilities: support both object and array formats
                    const vulns = t.vulnerabilities;
                    if (!vulns) return '';
                    let items = [];
                    if (Array.isArray(vulns)) {
                        items = vulns.filter(v => v.request || v.response);
                    } else if (vulns.request || vulns.response) {
                        items = [vulns];
                    }
                    if (items.length === 0) return '';
                    return `
                    <div class="detail-section http-viewer">
                        <span class="section-label">// Exploit Chain</span>
                        ${items.map((v, idx) => `
                        ${items.length > 1 ? `<div class="http-step-label">Step ${idx + 1}${v.name ? ': ' + escapeHtml(v.name) : ''}</div>` : ''}
                        <div class="http-exchange">
                            ${v.request ? renderHttpBlock('request', v.request, v.method || 'GET', idx, v.highlight) : ''}
                            ${v.request && v.response ? '<div class="http-arrow">▼ ▼ ▼</div>' : ''}
                            ${v.response ? renderHttpBlock('response', v.response, null, idx, v.highlight) : ''}
                        </div>
                        `).join('')}
                    </div>`;
                })()}

                    ${t.impact ? `
                    <div class="detail-section">
                        <span class="section-label">// Impact</span>
                        <p class="section-text">${escapeHtml(t.impact)}</p>
                    </div>
                    ` : ''}

                    ${t.remedy ? `
                    <div class="detail-section">
                        <span class="section-label">// Remedy</span>
                        <p class="section-text">${escapeHtml(t.remedy)}</p>
                    </div>
                    ` : ''}

                    ${info.targets?.length ? `
                    <div class="detail-section">
                        <span class="section-label">// Targets</span>
                        <div class="tags">${info.targets.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                    </div>
                    ` : ''}

                    ${info.tags?.length ? `
                    <div class="detail-section">
                        <span class="section-label">// Tags</span>
                        <div class="tags">${info.tags.map(tag =>
                    `<span class="tag ${['cve', 'xss', 'sqli', 'rce', 'ssrf', 'lfi', 'rfi'].includes(tag.toLowerCase()) ? 'danger' : ''}">${escapeHtml(tag)}</span>`
                ).join('')}</div>
                    </div>
                    ` : ''}

                    ${info.affected_versions?.length ? `
                    <div class="detail-section">
                        <span class="section-label">// Affected Versions</span>
                        <p class="section-text">${escapeHtml(info.affected_versions.join(', '))}</p>
                    </div>
                    ` : ''}

                    ${info.fixed_version ? `
                    <div class="detail-section">
                        <span class="section-label">// Fixed Version</span>
                        <p class="section-text">${escapeHtml(info.fixed_version)}</p>
                    </div>
                    ` : ''}

                    ${poc.nuclei?.length || poc.semgrep?.length || poc.bambda?.length ? `
                    <div class="detail-section">
                        <span class="section-label">// PoC Files</span>
                        <div class="poc-files">
                            ${poc.nuclei?.map(f => `<a href="${buildRepoUrl(t.category, t.id, f)}" target="_blank" rel="noopener" class="poc-file nuclei">nuclei: ${escapeHtml(f)}</a>`).join('') || ''}
                            ${poc.bambda?.map(f => `<a href="${buildRepoUrl(t.category, t.id, f)}" target="_blank" rel="noopener" class="poc-file bambda">bambda: ${escapeHtml(f)}</a>`).join('') || ''}
                            ${poc.semgrep?.map(f => `<a href="${buildRepoUrl(t.category, t.id, f)}" target="_blank" rel="noopener" class="poc-file semgrep">semgrep: ${escapeHtml(f)}</a>`).join('') || ''}
                        </div>
                    </div>
                    ` : ''}

                    ${providers['docker-compose'] ? `
                    <div class="detail-section post-install-section">
                        <span class="section-label">// VT CLI</span>
                        <ul class="post-install-list">
                            <li>./vt start --id ${escapeHtml(t.id)} --provider docker-compose</li>
                        </ul>
                    </div>
                    ` : ''}

                    ${info.cvss?.metrics ? `
                    <div class="detail-section">
                        <span class="section-label">// CVSS Metrics</span>
                        <code class="code-block">${escapeHtml(info.cvss.metrics)}</code>
                    </div>
                    ` : ''}

                    ${t.references?.length || info.references?.length ? `
                    <div class="detail-section">
                        <span class="section-label">// References</span>
                        <ul class="ref-list">${(t.references || info.references).map(ref => {
                    const safeHref = /^https?:\/\//i.test(ref) ? escapeHtml(ref) : '#';
                    return `<li><a href="${safeHref}" target="_blank" rel="noopener">${escapeHtml(ref)}</a></li>`;
                }).join('')}</ul>
                    </div>
                    ` : ''}

                    ${t['post-install']?.length ? `
                    <div class="detail-section post-install-section">
                        <span class="section-label">// Quick Start</span>
                        <ul class="post-install-list">${t['post-install'].map(step =>
                    `<li>${escapeHtml(step)}</li>`
                ).join('')}</ul>
                    </div>
                    ` : ''}

                    <div class="detail-actions">
                        <button class="btn btn-secondary" onclick="copyLink()">COPY LINK</button>
                        <a href="/" class="btn btn-primary">← BACK TO CATALOG</a>
                    </div>
                </div>
            `;
        }

        // Configuration
        const CONFIG = {
            REPO_BASE_URL: 'https://github.com/happyhackingspace/vt-templates/blob/main',
            REPO_RAW_URL: 'https://raw.githubusercontent.com/happyhackingspace/vt-templates/main'
        };

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function safeClass(s) {
            return String(s).replace(/[^a-zA-Z0-9_-]/g, '');
        }

        function isValidId(id) {
            return typeof id === 'string' && /^[a-zA-Z0-9_-]+$/.test(id) && id.length <= 50;
        }

        function isValidFilename(filename) {
            // Allow alphanumeric, hyphen, underscore, dot (for extensions)
            // Must not contain path traversal sequences
            if (typeof filename !== 'string') return false;
            if (filename.length === 0 || filename.length > 100) return false;
            // Reject path traversal attempts
            if (filename.includes('..') || filename.includes('/') || filename.includes('\\')) return false;
            // Only allow safe characters
            return /^[a-zA-Z0-9._-]+$/.test(filename);
        }

        function buildRepoUrl(category, templateId, filename) {
            // Validate all components before building URL
            if (!isValidId(templateId)) {
                console.warn('Invalid template ID:', templateId);
                return '#';
            }
            if (!isValidFilename(filename)) {
                console.warn('Invalid filename:', filename);
                return '#';
            }
            const safeCat = encodeURIComponent(category || 'cves');
            const safeId = encodeURIComponent(templateId);
            const safeFile = encodeURIComponent(filename);
            return `${CONFIG.REPO_BASE_URL}/${safeCat}/${safeId}/${safeFile}`;
        }

        function highlightHttp(raw, type, highlights) {
            const lines = raw.split('\n');
            let inBody = false;
            let result = lines.map(line => {
                if (line.trim() === '' && !inBody) { inBody = true; return '<span class="hl-sep">────────────────────────────────────────</span>'; }
                if (inBody) return `<span class="hl-body">${escapeHtml(line)}</span>`;
                if (type === 'request' && /^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)\s/.test(line)) {
                    const m = line.match(/^(\S+)\s+(\S+)\s*(.*)/);
                    if (m) return `<span class="hl-method">${escapeHtml(m[1])}</span> <span class="hl-url">${escapeHtml(m[2])}</span> <span class="hl-ver">${escapeHtml(m[3])}</span>`;
                }
                if (type === 'response' && /^HTTP\//.test(line)) {
                    const code = (line.match(/\s(\d{3})\s/) || [])[1] || '';
                    const cls = code.startsWith('2') ? 'hl-sok' : 'hl-serr';
                    return `<span class="${cls}">${escapeHtml(line)}</span>`;
                }
                const hm = line.match(/^([^:]+:)\s*(.*)/);
                if (hm) return `<span class="hl-hk">${escapeHtml(hm[1])}</span> <span class="hl-hv">${escapeHtml(hm[2])}</span>`;
                return escapeHtml(line);
            }).join('\n');
            if (highlights && highlights.length) {
                highlights.forEach(h => {
                    const escaped = escapeHtml(h);
                    result = result.split(escaped).join(`<span class="hl-danger">${escaped}</span>`);
                });
            }
            return result;
        }

        let _httpBlockId = 0;
        function renderHttpBlock(type, raw, method, idx, highlights) {
            const id = 'http-b-' + (idx !== undefined ? idx + '-' : '') + (++_httpBlockId);
            const isReq = type === 'request';
            let badge = '';
            if (isReq) {
                const m = (method || 'GET').toUpperCase();
                const cls = { GET: 'get', POST: 'post', PUT: 'put', DELETE: 'delete' }[m] || 'get';
                badge = `<span class="http-method ${cls}">${m}</span>`;
            } else {
                const statusMatch = raw.match(/HTTP\/\S+\s+(\d{3})\s*(.*)/);
                if (statusMatch) {
                    const code = statusMatch[1];
                    const text = statusMatch[2] || '';
                    const cls = code.startsWith('2') ? 's2xx' : code.startsWith('3') ? 's3xx' : code.startsWith('4') ? 's4xx' : 's5xx';
                    badge = `<span class="http-status ${cls}">${code} ${text}</span>`;
                }
            }
            return `<div class="http-block">
                <div class="http-block-header">
                    <div class="http-block-label"><span>${isReq ? 'Request' : 'Response'}</span>${badge}</div>
                    <button class="http-copy" onclick="copyHttp(this,'${id}')">Copy</button>
                </div>
                <div class="http-content"><pre id="${id}">${highlightHttp(raw.trim(), type, highlights)}</pre></div>
            </div>`;
        }

        function copyHttp(btn, preId) {
            const pre = document.getElementById(preId);
            const text = pre.textContent || pre.innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const btn = document.querySelector('.btn-secondary');
                btn.textContent = 'COPIED!';
                setTimeout(() => btn.textContent = 'COPY LINK', 2000);
            });
        }
    </script>
</body>

</html>
