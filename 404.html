<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found // Vulnerable Targets</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <style>
        .not-found-container {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .not-found h2 {
            color: var(--danger);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .not-found p {
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .not-found a {
            color: var(--accent);
        }

        .not-found a:hover {
            color: var(--text-bright);
        }
    </style>
</head>

<body>
    <canvas id="matrix-bg"></canvas>

    <header>
        <h1><a href="/">VULNERABLE TARGETS</a></h1>
        <p>// Security Research Templates Catalog //</p>
    </header>

    <div class="not-found-container">
        <div class="not-found">
            <h2>ERROR 404</h2>
            <p>Page not found.</p>
            <p style="margin-top: 1rem;"><a href="/">← Return to catalog</a></p>
        </div>
    </div>

    <footer>
        <a href="https://github.com/HappyHackingSpace" target="_blank">HappyHackingSpace</a> // 2026
    </footer>

    <script>
        // GitHub Pages fallback: redirect to detail.html preserving the path
        // detail.html reads template ID from both ?id=xxx and URL path
        const pathParts = window.location.pathname.split('/').filter(p => p);
        if (pathParts.length === 1 && /^[a-zA-Z0-9_-]+$/.test(pathParts[0])) {
            window.location.replace('/detail.html?id=' + encodeURIComponent(pathParts[0]));
        }

        // Matrix rain
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = 'アイウエオカキクケコ0123456789ABCDEF<>{}[]';
        const charArray = chars.split('');
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];
        for (let i = 0; i < columns; i++) drops[i] = Math.random() * -100;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#404040';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
    </script>
</body>

</html>
